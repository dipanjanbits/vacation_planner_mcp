name: Deploy to AWS ECS + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: vacation-planner
  ECS_CLUSTER: vacation-planner-cluster
  ECS_SERVICE: vacation-planner-service
  CONTAINER_NAME: vacation-planner
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_SYNC_PATH: Vacation-Planner

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure CloudWatch Logs group
        run: |
          set -e
          # Create log group if missing
          aws logs describe-log-groups --log-group-name-prefix /ecs/vacation-planner --region ${{ env.AWS_REGION }} \
            | grep -q '/ecs/vacation-planner' || aws logs create-log-group --log-group-name /ecs/vacation-planner --region ${{ env.AWS_REGION }} || true
          # Set a reasonable retention policy
          aws logs put-retention-policy --log-group-name /ecs/vacation-planner --retention-in-days 14 --region ${{ env.AWS_REGION }} || true

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }}

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Sync app assets to S3 bucket
        if: env.S3_BUCKET != ''
        run: |
          echo "Syncing app files to s3://$S3_BUCKET/$S3_SYNC_PATH/"
          aws s3 sync . s3://$S3_BUCKET/$S3_SYNC_PATH/ --delete

      - name: Create ECS Cluster if not exists
        run: |
          aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER }} --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE || \
          aws ecs create-cluster --cluster-name ${{ env.ECS_CLUSTER }}

      - name: Register ECS Task Definition
        id: task-def
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          # Create execution role if not exists
          aws iam get-role --role-name ecsTaskExecutionRole 2>/dev/null || \
          aws iam create-role \
            --role-name ecsTaskExecutionRole \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ecs-tasks.amazonaws.com"},"Action":"sts:AssumeRole"}]}' && \
          aws iam attach-role-policy \
            --role-name ecsTaskExecutionRole \
            --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

          cat > /tmp/task-def.json << EOF
          {
            "family": "vacation-planner",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "1024",
            "memory": "2048",
            "executionRoleArn": "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole",
            "containerDefinitions": [
              {
                "name": "${{ env.CONTAINER_NAME }}",
                "image": "${{ steps.build-image.outputs.image }}",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": 8501,
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  {"name": "MODEL", "value": "bedrock/us.amazon.nova-pro-v1:0"},
                  {"name": "AWS_REGION_NAME", "value": "${{ env.AWS_REGION }}"},
                  {"name": "AWS_DEFAULT_REGION", "value": "${{ env.AWS_REGION }}"},
                  {"name": "AWS_ACCESS_KEY_ID", "value": "${{ secrets.APP_AWS_ACCESS_KEY_ID }}"},
                  {"name": "AWS_SECRET_ACCESS_KEY", "value": "${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}"},
                  {"name": "Serper_API_KEY", "value": "${{ secrets.SERPER_API_KEY }}"},
                  {"name": "SSL_VERIFY", "value": "false"},
                  {"name": "PYTHONHTTPSVERIFY", "value": "0"}
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/vacation-planner",
                    "awslogs-region": "${{ env.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs",
                    "awslogs-create-group": "true"
                  }
                }
              }
            ]
          }
          EOF

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-def-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Setup VPC and ALB (first deploy only)
        id: infra
        run: |
          # Check if the service already exists
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "service-exists=true" >> $GITHUB_OUTPUT
            echo "Service already exists, will update."
          else
            echo "service-exists=false" >> $GITHUB_OUTPUT
            echo "First deploy — creating VPC, ALB, and ECS service..."

            # Get default VPC
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query 'Vpcs[0].VpcId' --output text)
            echo "vpc-id=$VPC_ID" >> $GITHUB_OUTPUT

            # Get subnets
            SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')
            SUBNET_1=$(echo $SUBNETS | cut -d',' -f1)
            SUBNET_2=$(echo $SUBNETS | cut -d',' -f2)
            echo "subnets=$SUBNET_1,$SUBNET_2" >> $GITHUB_OUTPUT

            # Create ALB security group
            ALB_SG=$(aws ec2 create-security-group \
              --group-name vacation-planner-alb-sg \
              --description "ALB SG for Vacation Planner" \
              --vpc-id $VPC_ID \
              --query 'GroupId' --output text 2>/dev/null || \
              aws ec2 describe-security-groups \
                --filters "Name=group-name,Values=vacation-planner-alb-sg" "Name=vpc-id,Values=$VPC_ID" \
                --query 'SecurityGroups[0].GroupId' --output text)
            aws ec2 authorize-security-group-ingress --group-id $ALB_SG --protocol tcp --port 80 --cidr 0.0.0.0/0 2>/dev/null || true
            echo "alb-sg=$ALB_SG" >> $GITHUB_OUTPUT

            # Create ECS security group
            ECS_SG=$(aws ec2 create-security-group \
              --group-name vacation-planner-ecs-sg \
              --description "ECS SG for Vacation Planner" \
              --vpc-id $VPC_ID \
              --query 'GroupId' --output text 2>/dev/null || \
              aws ec2 describe-security-groups \
                --filters "Name=group-name,Values=vacation-planner-ecs-sg" "Name=vpc-id,Values=$VPC_ID" \
                --query 'SecurityGroups[0].GroupId' --output text)
            aws ec2 authorize-security-group-ingress --group-id $ECS_SG --protocol tcp --port 8501 --source-group $ALB_SG 2>/dev/null || true
            echo "ecs-sg=$ECS_SG" >> $GITHUB_OUTPUT

            # Create ALB
            ALB_ARN=$(aws elbv2 create-load-balancer \
              --name vacation-planner-alb \
              --subnets $SUBNET_1 $SUBNET_2 \
              --security-groups $ALB_SG \
              --scheme internet-facing \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || \
              aws elbv2 describe-load-balancers \
                --names vacation-planner-alb \
                --query 'LoadBalancers[0].LoadBalancerArn' --output text)
            echo "alb-arn=$ALB_ARN" >> $GITHUB_OUTPUT

            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns $ALB_ARN \
              --query 'LoadBalancers[0].DNSName' --output text)
            echo "alb-dns=$ALB_DNS" >> $GITHUB_OUTPUT

            # Create Target Group
            TG_ARN=$(aws elbv2 create-target-group \
              --name vacation-planner-tg \
              --protocol HTTP --port 8501 \
              --vpc-id $VPC_ID \
              --target-type ip \
              --health-check-path /_stcore/health \
              --health-check-interval-seconds 30 \
              --healthy-threshold-count 2 \
              --unhealthy-threshold-count 5 \
              --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || \
              aws elbv2 describe-target-groups \
                --names vacation-planner-tg \
                --query 'TargetGroups[0].TargetGroupArn' --output text)
            echo "tg-arn=$TG_ARN" >> $GITHUB_OUTPUT

            # Create Listener
            aws elbv2 create-listener \
              --load-balancer-arn $ALB_ARN \
              --protocol HTTP --port 80 \
              --default-actions Type=forward,TargetGroupArn=$TG_ARN 2>/dev/null || true

            # Create ECS Service
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name ${{ env.ECS_SERVICE }} \
              --task-definition ${{ steps.task-def.outputs.task-def-arn }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_1,$SUBNET_2],securityGroups=[$ECS_SG],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=$TG_ARN,containerName=${{ env.CONTAINER_NAME }},containerPort=8501"

            echo "ALB DNS: $ALB_DNS"
          fi

      - name: Update ECS Service
        if: steps.infra.outputs.service-exists == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.task-def-arn }} \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --no-cli-pager || echo "Service may still be starting up"

      - name: Ensure CloudFront distribution exists
        id: ensure-cf
        run: |
          set -e
          # Check if CloudFront distribution already exists
          EXISTING_CF=$(aws cloudfront list-distributions --region ${{ env.AWS_REGION }} 2>/dev/null | \
            jq -r '.DistributionList.Items[] | select(.Comment=="Vacation Planner Streamlit App") | .DomainName' | head -1)
          
          if [ -n "$EXISTING_CF" ] && [ "$EXISTING_CF" != "null" ]; then
            echo "CloudFront distribution already exists: $EXISTING_CF"
            echo "cloudfront-domain=$EXISTING_CF" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get ALB DNS name
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names vacation-planner-alb \
            --query 'LoadBalancers[0].DNSName' --output text 2>/dev/null)
          
          if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
            echo "⚠️  ALB not ready yet, skipping CloudFront creation"
            exit 0
          fi
          
          echo "Creating CloudFront distribution..."
          cat > /tmp/cf-config.json << EOF
          {
            "CallerReference": "vacation-planner-$(date +%s)",
            "Comment": "Vacation Planner Streamlit App",
            "Enabled": true,
            "Origins": {
              "Quantity": 1,
              "Items": [
                {
                  "Id": "ALBOrigin",
                  "DomainName": "$ALB_DNS",
                  "CustomOriginConfig": {
                    "HTTPPort": 80,
                    "HTTPSPort": 443,
                    "OriginProtocolPolicy": "http-only"
                  }
                }
              ]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "ALBOrigin",
              "ViewerProtocolPolicy": "redirect-to-https",
              "AllowedMethods": {
                "Quantity": 7,
                "Items": ["GET", "HEAD", "OPTIONS", "PUT", "POST", "PATCH", "DELETE"],
                "CachedMethods": { "Quantity": 2, "Items": ["GET", "HEAD"] }
              },
              "CachePolicyId": "4135ea2d-6df8-44a3-9df3-4b5a84be39ad",
              "OriginRequestPolicyId": "216adef6-5c7f-47e4-b989-5492eafa07d3",
              "Compress": true
            }
          }
          EOF
          
          CF_DOMAIN=$(aws cloudfront create-distribution \
            --distribution-config file:///tmp/cf-config.json \
            --query 'Distribution.DomainName' --output text 2>/dev/null || echo "")
          
          if [ -n "$CF_DOMAIN" ]; then
            echo "CloudFront created: $CF_DOMAIN"
            echo "cloudfront-domain=$CF_DOMAIN" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Failed to create CloudFront, will retry on next deploy"
          fi

      - name: Setup CloudFront (first deploy only - deprecated)
        if: steps.infra.outputs.service-exists == 'false'
        run: |
          ALB_DNS=${{ steps.infra.outputs.alb-dns }}

          cat > /tmp/cf-config.json << EOF
          {
            "CallerReference": "vacation-planner-$(date +%s)",
            "Comment": "Vacation Planner Streamlit App",
            "Enabled": true,
            "Origins": {
              "Quantity": 1,
              "Items": [
                {
                  "Id": "ALBOrigin",
                  "DomainName": "$ALB_DNS",
                  "CustomOriginConfig": {
                    "HTTPPort": 80,
                    "HTTPSPort": 443,
                    "OriginProtocolPolicy": "http-only"
                  }
                }
              ]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "ALBOrigin",
              "ViewerProtocolPolicy": "redirect-to-https",
              "AllowedMethods": {
                "Quantity": 7,
                "Items": ["GET", "HEAD", "OPTIONS", "PUT", "POST", "PATCH", "DELETE"],
                "CachedMethods": { "Quantity": 2, "Items": ["GET", "HEAD"] }
              },
              "CachePolicyId": "4135ea2d-6df8-44a3-9df3-4b5a84be39ad",
              "OriginRequestPolicyId": "216adef6-5c7f-47e4-b989-5492eafa07d3",
              "Compress": true
            }
          }
          EOF

          CF_DOMAIN=$(aws cloudfront create-distribution \
            --distribution-config file:///tmp/cf-config.json \
            --query 'Distribution.DomainName' --output text)

          echo "============================================"
          echo "CloudFront URL: https://$CF_DOMAIN"
          echo "ALB URL: http://$ALB_DNS"
          echo "============================================"
          echo "cloudfront-domain=$CF_DOMAIN" >> $GITHUB_OUTPUT
          echo "alb-dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Print deployment URLs
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names vacation-planner-alb \
            --query 'LoadBalancers[0].DNSName' --output text 2>/dev/null || echo "unknown")

          CF_DOMAIN=$(aws cloudfront list-distributions --region ${{ env.AWS_REGION }} 2>/dev/null | \
            jq -r '.DistributionList.Items[] | select(.Comment=="Vacation Planner Streamlit App") | .DomainName' | head -1)
          CF_DOMAIN=${CF_DOMAIN:-"unknown"}

          echo "============================================"
          echo "ALB URL: http://$ALB_DNS"
          echo "CloudFront URL: https://$CF_DOMAIN"
          echo "============================================"
          echo "cloudfront-domain=$CF_DOMAIN" >> $GITHUB_OUTPUT
          echo "alb-dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          CF_DOMAIN="${{ steps.ensure-cf.outputs.cloudfront-domain }}"
          [ -z "$CF_DOMAIN" ] && CF_DOMAIN="${{ steps.infra.outputs.cloudfront-domain }}" || true
          [ -z "$CF_DOMAIN" ] && CF_DOMAIN="unknown" || true
          
          ALB_DNS="${{ steps.infra.outputs.alb-dns }}"
          [ -z "$ALB_DNS" ] && ALB_DNS="unknown" || true
          
          echo "✅ Deployment complete!"
          echo ""
          echo "📍 Access points:"
          echo "  • ALB (direct):     http://$ALB_DNS"
          echo "  • CloudFront (CDN): https://$CF_DOMAIN"
          echo ""
          if [ "$CF_DOMAIN" != "unknown" ]; then
            echo "⏱️  CloudFront may take 5-15 minutes to deploy globally"
          else
            echo "⚠️  CloudFront URL not yet available (check logs for errors)"
          fi
